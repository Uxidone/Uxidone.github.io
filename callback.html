<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Callback</title>
    <script>
        const clientID = "Ov23lix6JjJDqpivJzdb";  // Replace with your actual GitHub Client ID
        const clientSecret = "15f24667f27f9ae0ddd66577c1f4200ceeb184be";  // Replace with your actual Client Secret
        const redirectURI = "https://uxidone.github.io/callback.html"; // Your callback URL

        // Function to handle the OAuth flow
        async function handleOAuth() {
            // Get the code from the URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get("code");
            
            if (!code) {
                alert("No authorization code found!");
                return;
            }

            // Exchange the code for an access token
            try {
                const response = await fetch(`https://github.com/login/oauth/access_token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        client_id: clientID,
                        client_secret: clientSecret,
                        code: code,
                        redirect_uri: redirectURI
                    })
                });
                const data = await response.json();

                // Check if the access token was successfully obtained
                if (data.access_token) {
                    // Use the access token to fetch the user's GitHub information
                    const userResponse = await fetch('https://api.github.com/user', {
                        headers: {
                            'Authorization': `Bearer ${data.access_token}`
                        }
                    });
                    const userData = await userResponse.json();

                    // Display the user's GitHub username
                    alert("You are logged in as: " + userData.login);
                    // Optionally, redirect to another page
                    window.location.href = "/PromoCodes/paymentstab"; // Redirect to a specific page
                } else {
                    alert("Authentication failed. Please try again.");
                }
            } catch (error) {
                console.error("Error during authentication:", error);
                alert("An error occurred. Please try again.");
            }
        }

        // Start the OAuth flow when the page is loaded
        window.onload = handleOAuth;
    </script>
</head>
<body>
    <h1>GitHub OAuth Callback</h1>
    <p>Processing your authentication...</p>
</body>
</html>
