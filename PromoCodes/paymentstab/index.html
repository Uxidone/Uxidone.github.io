<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Codes - Payment Tab</title>
    <script>
        async function checkGitHubUser() {
            try {
                const response = await fetch('https://api.github.com/users/Uxidone');
                if (response.status === 200) {
                    document.getElementById("promoCodes").style.display = "block";
                } else {
                    document.getElementById("accessDenied").style.display = "block";
                }
            } catch (error) {
                document.getElementById("accessDenied").style.display = "block";
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: auto;
        }
        .hidden {
            display: none;
        }
        .promo {
            background: #2ecc71;
            color: white;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body onload="checkGitHubUser()">
    <div class="container">
        <h1>Promo Codes - Payment Tab</h1>
        <div id="accessDenied" class="hidden">
            <p>Access Denied: You must be @Uxidone on GitHub to view promo codes.</p>
        </div>
        <div id="promoCodes" class="hidden">
            <p>Here are your exclusive promo codes:</p>
            <div class="promo">SAVE10 - 10% Off</div>
            <div class="promo">FREESHIP - Free Shipping</div>
            <div class="promo">VIPACCESS - Exclusive Content</div>
            <div class="promo">EARLYBIRD - 15% Off for Early Buyers</div>
        </div>
    </div>
</body>
</html>
