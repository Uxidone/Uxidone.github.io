<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Codes</title>
    <script>
        async function checkGitHubUser() {
            const response = await fetch('https://api.github.com/users/Uxidone');
            if (response.status === 200) {
                document.getElementById("paymentButton").style.display = "block";
            } else {
                alert("Access Denied: You must be @Uxidone on GitHub to access this page.");
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: auto;
        }
        .button {
            display: none;
            padding: 10px 20px;
            font-size: 1em;
            color: white;
            background: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body onload="checkGitHubUser()">
    <div class="container">
        <h1>Promo Codes</h1>
        <p>Welcome to the promo codes section. Exclusive access required.</p>
        <a id="paymentButton" href="/PromoCodes/paymentstab" class="button">Go to Payment Tab</a>
    </div>
</body>
</html>
