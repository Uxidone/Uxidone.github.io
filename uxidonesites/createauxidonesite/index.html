<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create New Uxidone Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }

    @media(max-width: 600px) {
      .container {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Create New Uxidone Site</h1>
  <button onclick="generateSite()">Generate Site</button>
</div>

<script>
  function generateSite() {
    const randomID = Math.random().toString(36).substring(2, 12);
    const lang = prompt("Enter your site language (English / Russian / Latvian):");
    const desc = prompt("Enter your site description:");

    window.location.href = `/uxidonesites/created?id=${randomID}&lang=${encodeURIComponent(lang)}&desc=${encodeURIComponent(desc)}`;
  }
</script>

</body>
</html>
