<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create New Uxidone Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #58a6ff;
    }
    button {
      background-color: #238636;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2ea043;
    }
    .result {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background-color: #161b22;
    }
    a {
      color: #58a6ff;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <h1>Create New Uxidone Site</h1>
  <p>Click the button below to generate your new site.</p>

  <button onclick="generateSite()">Generate Uxidone Site</button>

  <div class="result" id="result" style="display:none;">
    <h2>Your Site Info:</h2>
    <p><strong>Language:</strong> <span id="langOutput"></span></p>
    <p><strong>Description:</strong> <span id="descOutput"></span></p>
    <p>Your Site URL:</p>
    <p id="siteURL"></p>
    <button onclick="alert('Request sent! Admin will create the site manually.')">Request Site Creation</button>
  </div>

<script>
  function generateSite() {
    const randomID = Math.random().toString(36).substring(2, 12);
    const lang = prompt("Enter your site language (English / Russian / Latvian):");
    const desc = prompt("Enter your site description:");

    const siteURL = `https://uxidone.github.io/uxidonesites/created/sites/${randomID}/index.html`;

    document.getElementById('langOutput').innerText = lang;
    document.getElementById('descOutput').innerText = desc;
    document.getElementById('siteURL').innerHTML = `<a href="${siteURL}" target="_blank">${siteURL}</a>`;

    document.getElementById('result').style.display = 'block';
  }
</script>

</body>
</html>
