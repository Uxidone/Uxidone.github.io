<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Created</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #58a6ff;
    }
    .result {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background-color: #161b22;
    }
    a {
      color: #58a6ff;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <h1>Your Site Has Been Created!</h1>
  <p>Thank you for creating your new site. Here is your unique site ID:</p>

  <div class="result" id="result">
    <h2>Site ID: <span id="siteID"></span></h2>
    <p>Your site URL is:</p>
    <p><a id="siteURL" href="#" target="_blank">Loading...</a></p>
  </div>

  <script>
    // Get the query parameter from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const siteID = urlParams.get('id'); // Get the value of 'id' from the URL
    
    // Display the site ID and URL
    if (siteID) {
      document.getElementById('siteID').innerText = siteID;
      const siteURL = `https://uxidone.github.io/uxidonesites/createauxidonesite/created/sites/${siteID}/index.html`;
      document.getElementById('siteURL').innerText = siteURL;
      document.getElementById('siteURL').setAttribute('href', siteURL);
    } else {
      document.getElementById('result').innerHTML = '<h2>Error: No site ID found in the URL.</h2>';
    }
  </script>

</body>
</html>
