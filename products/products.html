<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products - Uxidone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .product {
            background: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        .product:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .product h3 {
            color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Our Products</h2>
        <div class="product">
            <h3>Product 1</h3>
            <p>Description of Product 1.</p>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>Description of Product 2.</p>
        </div>
        <div class="product">
            <h3>Product 3</h3>
            <p>Description of Product 3.</p>
        </div>
    </div>
</body>
</html>
